<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TTC Delay Data</title>
    <script src="node_modules/d3/build/d3.js" charset="utf-8"></script>
    <style>
        .axis--x path {
          display: none;
        }

        .line {
          fill: none;
          stroke: steelblue;
          stroke-width: 1.5px;
        }

    </style>
</head>
<body>
<h1>chart</h1>
<svg width="1060" height="500"></svg>

<script>

// increasing right margin makes sure data on the right doesn't get cut off
var svg = d3.select("svg"),
    margin = {top: 20, right: 100, bottom: 30, left: 50},
    width = +svg.attr("width") - margin.left - margin.right,
    height = +svg.attr("height") - margin.top - margin.bottom,
    g = svg.append("g").attr("transform", "translate(" + margin.left + "," + margin.top + ")");

var parseTime = d3.timeParse("%H:%M:%S");

// Set the ranges
var x = d3.scaleTime().range([0, width]),
    y = d3.scaleLinear().range([height, 0]),
    z = d3.scaleOrdinal(d3.schemeCategory10);

var line = d3.line()
    .curve(d3.curveBasis)
    .x(function(d) {return x(d.date); })
    .y(function(d) {return y(d.Delay); });


// var parseTime = d3.timeParse("%y-%m-%d");
// for some reason ParseTime does not work, but creating a new
// Date object does, as show below

d3.csv('data.csv',type,function(error,data) {
    if (error) throw error;

    var days = data.columns.slice(1).map(function(id) {
        return {
          id: id,
          values: data.map(function(d) {
            return {date: d.date, Delay: d[id]};
          })
        };
    });

    x.domain(d3.extent(data, function(d) { return d.date; }));
    y.domain([
        d3.min(days, function(c) { return d3.min(c.values, function(d) { return d.Delay; }); }),
        d3.max(days, function(c) { return d3.max(c.values, function(d) { return d.Delay; }); })
      ]);
    z.domain(days.map(function(c) { return c.id; }));

    g.append("g")
        .attr("class", "axis axis--x")
        .attr("transform", "translate(0," + height + ")")
        .call(d3.axisBottom(x));

    g.append("g")
        .attr("class", "axis axis--y")
        .call(d3.axisLeft(y))
      .append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", 6)
        .style("font", "12px sans-serif")
        .attr("dy", "2em")
        .attr("fill", "#000")
        .text("Delay (Minutes)");

    var day = g.selectAll(".day")
        .data(days)
        .enter().append("g")
        .attr("class", "day");

    day.append("path")
        .attr("class", "line")
        .attr("d", function(d) { return line(d.values); })
        .style("stroke", function(d) { return z(d.id); });

    day.append("text")
        .datum(function(d) { return {id: d.id, value: d.values[d.values.length - 1]}; })
        .attr("transform", function(d) { return "translate(" + x(d.value.date) + "," + y(d.value.Delay) + ")"; })
        .attr("x", 4)
        .style("font", "12px sans-serif")
        .attr("dy", "1em")
        .style("font", "12px sans-serif")
        .text(function(d) { return d.id; });
});

function type(d, _, columns) {
  d.date = parseTime(d.date);
  for (var i = 1, n = columns.length, c; i < n; ++i) d[c = columns[i]] = +d[c];
  return d;
}

</script>
</body>
</html>
